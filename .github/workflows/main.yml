name: macOS Remote VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: macos-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      # 1. Connexion Tailscale
      - name: Connexion au réseau Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # 2. Configuration complète du VNC pour l'écran de verrouillage
      - name: Activer le VNC macOS (Accès Login Screen)
        run: |
          echo "=== Création de l'utilisateur ==="
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/bash
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID 502
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "MonMotDePasseSecurise123!"
          sudo createhomedir -c -u vncuser
          sudo dscl . -append /Groups/admin GroupMembership vncuser

          echo "=== Activation et autorisation du Partage d'écran ==="
          # Permet à l'agent VNC de tourner même si personne n'est connecté
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # Configuration pour autoriser TOUS les utilisateurs (y compris vncuser) à se connecter via l'écran d'accueil
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartOnConsole -bool true
          sudo defaults write /Library/Preferences/com.apple.screensharing CMD_AllowAllUsersScreenSharing -bool true

      # 3. Maintien de la machine active (Plus de killall loginwindow !)
      - name: Maintenir la session active (Timeout 1 heure)
        run: |
          echo "=========================================================="
          echo "  Machine macOS prête ! Connecte-toi via Tailscale."
          echo "  Identifiant de connexion VNC : vncuser"
          echo "  Mot de passe VNC             : MonMotDePasseSecurise123!"
          echo "=========================================================="
          sleep 3600
